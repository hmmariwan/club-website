<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Club</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Club Logo">
            <span>Club 1999</span>
        </div>

        <div class="menu-toggle" id="menu-toggle">
            ☰
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="/">Home</a></li>

            <li class="dropdown">
                <a href="#" class="dropbtn">What We Do ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="/activities/reading">Reading Club</a></li>
                    <li><a href="/activities/art">Artwork</a></li>
                    <li><a href="/activities/stories">Stories & Poetry</a></li>
                </ul>
            </li>

            <li><a href="/events">Stories</a></li>
            <li class="dropdown">
                <a href="#" class="dropbtn">Get Involved ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="/login">Login</a></li>
                    <li><a href="/join">Join</a></li>
                </ul>
            </li>

            {% if current_user.is_authenticated %}
                <a href="/dashboard">Dashboard</a>
                <a href="/logout">Logout</a>
            {% endif %}

            
            
            <li><a href="/contact">Contact</a></li>

        </ul>
    </nav>
</header>

{% block content %}
{% endblock %}

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
