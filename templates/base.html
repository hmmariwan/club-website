<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Club Logo">
            <span class="brand-text">Lend a Hand</span>
        </div>

        <div class="menu-toggle" id="menu-toggle">
            ☰
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="/">Home</a></li>

            <li class="dropdown">
                <a href="#" class="dropbtn">What We Do ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="/whatwedo/education">Education Support</a></li>
                    <li><a href="/whatwedo/community">Community Aid</a></li>
                    <li><a href="/whatwedo/child">Child Protection</a></li>
                </ul>
            </li>

            <li><a href="/story">Story</a></li>
            <li class="dropdown">
                <a href="#" class="dropbtn">Get Involved ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="/login">Login</a></li>
                    <li><a href="/join">Join</a></li>
                </ul>
            </li>

            {% if current_user.is_authenticated %}
                <a href="/dashboard">Dashboard</a>
                <a href="/logout">Logout</a>
            {% endif %}

            <li><a href="/donate">Donate</a></li>
            <li><a href="/contact">Contact</a></li>

        </ul>
    </nav>
</header>

<main class="content">
    {% block content %}
    {% endblock %}
</main>

<footer class="site-footer">
    <div class="social-links">
        
        <a href="https://facebook.com/YOUR_PAGE" target="_blank" class="social-icon facebook" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://instagram.com/YOUR_PAGE" target="_blank" class="social-icon instagram" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>

    </div>
</footer>

<script src="{{ url_for('static', filename='js/nav.js') }}"></script>
</body>
</html>
