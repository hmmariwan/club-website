<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f6f8;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .admin {
            color: green;
            font-weight: bold;
        }

        .user {
            color: #555;
        }

        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Interests</th>
        <th>Member ID</th>
        <th>Role</th>
        <th>Action</th>
    </tr>

    {% for m in members %}
    <tr>
        <td>{{ m.id }}</td>
        <td>{{ m.name }}</td>
        <td>{{ m.email }}</td>
        <td>{{ m.phone }}</td>
        <td>{{ m.interests }}</td>
        <td>{{ m.member_id }}</td>
        <td class="{{ m.role }}">{{ m.role }}</td>
        <td>
            {% if m.id != current_user.id %}
            <form action="{{ url_for('delete_user', user_id=m.id) }}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('Are you sure you want to delete this user?');">
                    Delete
                </button>
            </form>
            {% else %}
                <span style="color: gray;">You</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
