{% extends "base.html" %}

{% block content %}

<h2>Contact Us</h2>

{% if success %}
    <p style="color: green;">Message sent successfully!</p>
{% endif %}

<form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Message:</label><br>
    <textarea name="message" rows="5" required></textarea><br><br>

    <button type="submit">Send Message</button>
</form>

<br><br>

<h3>Find Us</h3>

<iframe 
  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d2483.718818906723!2d-0.12963391943902916!3d51.50002721294381!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2suk!4v1777031606479!5m2!1sen!2suk" 
  width="400" 
  height="400" 
  style="border:0; margin-left: 10px;" 
  allowfullscreen="" 
  loading="lazy" 
  referrerpolicy="no-referrer-when-downgrade">
</iframe>

{% endblock %}
